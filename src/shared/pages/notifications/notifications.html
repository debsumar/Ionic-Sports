<ion-header>
  <ion-navbar>
    <ion-title>Send Notification</ion-title>
    <ion-buttons end>
      <button ion-button icon-only (click)="sendNotification()">
        <ion-icon name="send"></ion-icon>
      </button>
    </ion-buttons>
  </ion-navbar>
</ion-header>

<ion-content>
  <div class="notif-header">
    <div class="recipient-badge-row">
      <div class="recipient-badge">
        <ion-icon name="people"></ion-icon>
        <span>{{numberOfPeople}}</span>
      </div>
      <button type="button" class="select-all-toggle" *ngIf="isLeagueTeams && allUsers.length > 0" (click)="toggleSelectAll()">
        <ion-icon [name]="allSelected ? 'checkbox' : 'square-outline'"></ion-icon>
        <span>{{allSelected ? 'Unselect all' : 'Select all'}}</span>
      </button>
    </div>

    <!-- Read-only chips (leaguedetails — no selection) -->
    <div class="recipient-chips" *ngIf="!isLeagueTeams">
      <span class="recipient-chip" *ngFor="let name of userNames">{{name}}</span>
    </div>

    <!-- Selectable chips (league_match_info — isLeagueTeams) -->
    <div class="recipient-chips" *ngIf="isLeagueTeams">
      <button type="button" class="recipient-chip"
        *ngFor="let u of allUsers"
        [class.chip-unselected]="!u.selected"
        [class.chip-paid]="u.payStatus == 1"
        [class.chip-pending]="u.payStatus == 0"
        (click)="toggleUser(u)">
        <ion-icon [name]="u.selected ? 'checkmark-circle' : 'ellipse-outline'"></ion-icon>
        {{u.name}}
      </button>
    </div>

    <div class="heading-display" *ngIf="notification_input.heading">
      <ion-icon name="notifications"></ion-icon>
      <span>{{notification_input.heading}}</span>
    </div>
  </div>

  <ion-list>
    <ion-item class="form-item description-item">
      <ion-label stacked>Message</ion-label>
      <ion-textarea rows="10" style="white-space:pre-wrap;" [(ngModel)]="notification_input.message" placeholder="Type a message here..."></ion-textarea>
    </ion-item>
  </ion-list>

  <div class="send-btn-wrap">
    <button class="btn-send" (click)="sendNotification()">
      <ion-icon name="send"></ion-icon> Send Notification
    </button>
  </div>
</ion-content>
