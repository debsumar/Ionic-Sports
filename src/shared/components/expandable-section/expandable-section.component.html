<ion-item class="expandable-header">
  <ion-label>{{label}}</ion-label>
  <label class="toggle" item-end>
    <input #cb type="checkbox" [checked]="expanded" (change)="onToggle(cb)">
    <span data-unchecked="No" data-checked="Yes"></span>
  </label>
</ion-item>
<div class="expandable-body" [class.expanded]="expanded">
  <ng-content></ng-content>
</div>
