<ion-header>

  <ion-navbar>
    <ion-title>Add Team</ion-title>
  </ion-navbar>

</ion-header>


<ion-content [class.dark-theme]="isDarkTheme" [class.light-theme]="!isDarkTheme">
  <div class="form-wrap">

    <app-form-field [isDark]="isDarkTheme">
      <ion-item>
        <ion-label>Role</ion-label>
        <ion-select [(ngModel)]="selectedRole">
          <ion-option *ngFor="let role of roleObj;let i = index" value={{i}}>{{role.Name}}</ion-option>
        </ion-select>
      </ion-item>
    </app-form-field>

    <div class="chip-section">
      <span class="chip-section-label">Venues</span>
      <div class="chip-row">
        <span class="venue-chip" *ngFor="let vanue of clubList;let i = index"
          (click)="addClub(vanue)" [class.selected]="this.selectedClubSet.has(vanue)">
          {{vanue.ClubShortName}}
        </span>
      </div>
    </div>

    <ion-row>
      <ion-col col-6>
        <app-form-field [isDark]="isDarkTheme">
          <ion-item>
            <ion-label stacked>First Name</ion-label>
            <ion-input [(ngModel)]="saveObj.FirstName"></ion-input>
          </ion-item>
        </app-form-field>
      </ion-col>
      <ion-col col-6>
        <app-form-field [isDark]="isDarkTheme">
          <ion-item>
            <ion-label stacked>Last Name</ion-label>
            <ion-input [(ngModel)]="saveObj.LastName"></ion-input>
          </ion-item>
        </app-form-field>
      </ion-col>
    </ion-row>

    <app-form-field [isDark]="isDarkTheme">
      <ion-item>
        <ion-label stacked>Email</ion-label>
        <ion-input type="email" [(ngModel)]="saveObj.EmailID" autocomplete="off"></ion-input>
      </ion-item>
    </app-form-field>
    <app-form-field [isDark]="isDarkTheme">
      <ion-item>
        <ion-label stacked>Password</ion-label>
        <ion-input type="password" [(ngModel)]="saveObj.Password" autocomplete="off"></ion-input>
      </ion-item>
    </app-form-field>

    <div class="chip-section" *ngIf="Menus.length > 0">
      <span class="chip-section-label">Module Access</span>
      <div class="access-list">
        <div class="access-row" *ngFor="let menu of Menus;let i=index">
          <span class="access-name">{{menu.DisplayTitle}}</span>
          <label class="custom_toggle">
            <input type="checkbox" [(ngModel)]="menu.MobileAccess">
            <span data-unchecked="No" data-checked="Yes"></span>
          </label>
        </div>
      </div>
    </div>

  </div>
</ion-content>
<ion-footer no-border [class.dark-theme]="isDarkTheme" [class.light-theme]="!isDarkTheme">
  <app-glass-button label="Save" (btnClick)="saveUser()"></app-glass-button>
</ion-footer>
