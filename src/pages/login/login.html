<ion-content class="login-content">
    <!-- Background image -->
    <img src="assets/images/bgi.jpeg" class="bg-img">

    <!-- Form overlay -->
    <div class="form-section">
        <ion-grid class="login-form">
            <ion-row class="input-row">
                <ion-col col-1>
                    <ion-icon name="mail" class="input-icon"></ion-icon>
                </ion-col>
                <ion-col col-11>
                    <ion-input type="text" inputmode="email" autocomplete="email" [(ngModel)]="user.emailID" placeholder="Email" name="admin_input"></ion-input>
                </ion-col>
            </ion-row>

            <ion-row class="input-row">
                <ion-col col-1>
                    <ion-icon name="lock" class="input-icon"></ion-icon>
                </ion-col>
                <ion-col col-10>
                    <ion-input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="user.password" placeholder="Password" name="admin_password" [clearOnEdit]="false"></ion-input>
                </ion-col>
                <ion-col col-1>
                    <ion-icon [name]="showPassword ? 'eye' : 'eye-off'" class="toggle-pw" (click)="showPassword = !showPassword"></ion-icon>
                </ion-col>
            </ion-row>

            <ion-row>
                <ion-col text-right style="padding: 0;">
                    <span (click)="goToForgotPassword()" class="forgot-link">Forgot Password?</span>
                </ion-col>
            </ion-row>

            <ion-row>
                <ion-col col-12>
                    <button ion-button block class="login-btn" (click)="login()">Login</button>
                </ion-col>
            </ion-row>
        </ion-grid>
    </div>
</ion-content>
