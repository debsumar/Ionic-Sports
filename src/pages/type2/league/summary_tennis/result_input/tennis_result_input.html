<ion-header>
  <ion-navbar>
    <ion-title>Match Result</ion-title>
    <ion-buttons end>
      <button ion-button icon-only (click)="cancel()">
        <ion-icon name="close"></ion-icon>
      </button>
    </ion-buttons>
  </ion-navbar>
</ion-header>

<ion-content>
  <div class="page-layout">
    <div class="page-fixed-header">
      <div class="match-badge">
        <ion-icon name="trophy" class="badge-icon"></ion-icon>
        <span>{{teamData.homeTeamName}} vs {{teamData.awayTeamName}}</span>
      </div>
    </div>

    <div class="page-scroll-area">
      <!-- Match Winner -->
      <div class="result-card">
        <div class="card-label"><ion-icon name="medal"></ion-icon> Match Winner</div>
        <div class="winner-options">
          <div class="winner-option" [class.selected]="selectedWinner === teamData.homeTeamId"
            [class.disabled]="!isEditable" (click)="isEditable && selectWinner(teamData.homeTeamId)">
            <ion-icon [name]="selectedWinner === teamData.homeTeamId ? 'checkmark-circle' : 'radio-button-off'"
              [class.checked]="selectedWinner === teamData.homeTeamId"></ion-icon>
            <span>{{teamData.homeTeamName}}</span>
          </div>
          <div class="winner-option" [class.selected]="selectedWinner === teamData.awayTeamId"
            [class.disabled]="!isEditable" (click)="isEditable && selectWinner(teamData.awayTeamId)">
            <ion-icon [name]="selectedWinner === teamData.awayTeamId ? 'checkmark-circle' : 'radio-button-off'"
              [class.checked]="selectedWinner === teamData.awayTeamId"></ion-icon>
            <span>{{teamData.awayTeamName}}</span>
          </div>
        </div>
      </div>

      <!-- Match Status -->
      <div class="result-card">
        <div class="card-label"><ion-icon name="flag"></ion-icon> Match Status</div>
        <div class="dropdown-trigger" [class.disabled]="!isEditable" (click)="isEditable && toggleStatusDropdown()">
          <span class="dropdown-text">{{selectedResultStatus?.status || 'Select status'}}</span>
          <ion-icon name="chevron-down" [class.rotated]="showStatusDropdown"></ion-icon>
        </div>
        <div class="dropdown-list" *ngIf="showStatusDropdown">
          <div *ngFor="let status of resultStatusList" class="dropdown-item"
            [class.active]="selectedResultStatus?.id === status.id" (click)="selectStatus(status)">
            <span>{{status.status}}</span>
            <ion-icon name="checkmark" *ngIf="selectedResultStatus?.id === status.id"></ion-icon>
          </div>
        </div>
      </div>
    </div>
  </div>

  <app-glass-button label="Save Result" (btnClick)="saveResult()"></app-glass-button>
</ion-content>
