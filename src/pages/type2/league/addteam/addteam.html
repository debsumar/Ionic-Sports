<ion-header>
  <ion-navbar>
    <ion-title>Add Team To League</ion-title>
  </ion-navbar>
</ion-header>

<ion-content>
  <div class="page-layout">
    <div class="page-fixed-header">
      <app-search-bar placeholder="Search team by name"
        [count]="filteredteams?.length"
        (search)="getFilterItems($event)">
      </app-search-bar>
      <div class="section-header">
        <span class="section-title">Team List</span>
      </div>
    </div>

    <div class="page-scroll-area">
      <app-list-card *ngFor="let team of filteredteams; let i = index"
        [accentColor]="team.isAlreadyExisted ? '#64748b' : (team.isSelected ? '#10b981' : '#2b92bb')">
        <div class="team-row" (click)="!team.isAlreadyExisted && selectTeam(team)">
          <div class="team-avatar">{{team.teamName?.charAt(0)}}</div>
          <div class="team-info">
            <p class="team-name">{{team.teamName}}</p>
            <span class="team-tag existing" *ngIf="team.isAlreadyExisted">Already Added</span>
          </div>
          <ion-checkbox
            [(ngModel)]="team.isSelected"
            [disabled]="team.isAlreadyExisted"
            (ionChange)="selectTeam(team)">
          </ion-checkbox>
        </div>
      </app-list-card>

      <div class="empty-state" *ngIf="filteredteams?.length === 0">
        <ion-icon name="people" class="empty-icon"></ion-icon>
        <p class="empty-text">No teams found</p>
      </div>
    </div>
  </div>

  <app-glass-button label="Add" (btnClick)="assignTeams()"></app-glass-button>
</ion-content>
