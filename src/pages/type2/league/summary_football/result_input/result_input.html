<ion-header>
  <ion-navbar>
    <ion-title>Result</ion-title>
    <ion-buttons end>
      <button ion-button icon-only (click)="dismiss()">
        <ion-icon name="close"></ion-icon>
      </button>
    </ion-buttons>
  </ion-navbar>
</ion-header>

<ion-content>
  <div class="page-layout">
    <div class="page-fixed-header">
      <div class="match-badge">
        <ion-icon name="trophy" class="badge-icon"></ion-icon>
        <span>{{homeTeamName}} vs {{awayTeamName}}</span>
      </div>
    </div>

    <div class="page-scroll-area">
      <!-- Match Status -->
      <div class="result-card">
        <div class="card-label"><ion-icon name="flag"></ion-icon> Match Status</div>
        <div class="dropdown-trigger" [class.disabled]="!isEditable" (click)="isEditable && toggleStatusDropdown()">
          <span class="dropdown-text">{{selectedResultStatus?.status || 'Select Status'}}</span>
          <ion-icon name="chevron-down" [class.rotated]="showStatusDropdown"></ion-icon>
        </div>
        <div class="dropdown-list" *ngIf="showStatusDropdown">
          <div *ngFor="let status of resultStatusList" class="dropdown-item"
            [class.active]="selectedResultStatus?.status === status.status" (click)="selectStatus(status)">
            <span>{{status.status}}</span>
            <ion-icon name="checkmark" *ngIf="selectedResultStatus?.status === status.status"></ion-icon>
          </div>
        </div>
      </div>

      <!-- Winner Selection -->
      <div class="result-card" *ngIf="selectedResultStatus?.status?.toUpperCase() === 'WIN'">
        <div class="card-label"><ion-icon name="trophy"></ion-icon> Winner Team</div>
        <div class="dropdown-trigger" [class.disabled]="!isEditable" (click)="isEditable && toggleWinnerDropdown()">
          <span class="dropdown-text">{{getSelectedWinnerName() || 'Select Winner Team'}}</span>
          <ion-icon name="chevron-down" [class.rotated]="showWinnerDropdown"></ion-icon>
        </div>
        <div class="dropdown-list" *ngIf="showWinnerDropdown">
          <div *ngFor="let team of TEAMS" class="dropdown-item"
            [class.active]="selectedWinnerTeamId === team?.parentclubteam?.id"
            (click)="selectWinnerTeam(team?.parentclubteam?.id)">
            <span>{{team?.parentclubteam?.teamName}}</span>
            <ion-icon name="checkmark" *ngIf="selectedWinnerTeamId === team?.parentclubteam?.id"></ion-icon>
          </div>
        </div>
      </div>

      <!-- Goals -->
      <div class="result-card"
        *ngIf="selectedResultStatus?.status?.toUpperCase() === 'DRAW' || selectedResultStatus?.status?.toUpperCase() === 'WIN'">
        <div class="card-label"><ion-icon name="football"></ion-icon> Goals</div>
        <div class="goals-row">
          <div class="goal-team">
            <span class="goal-team-name">{{homeTeamName}}</span>
            <ion-input type="number" class="goal-input" [(ngModel)]="homeTeamGoals" min="0" max="150" placeholder="0" [disabled]="!isEditable"></ion-input>
          </div>
          <span class="goal-vs">-</span>
          <div class="goal-team">
            <span class="goal-team-name">{{awayTeamName}}</span>
            <ion-input type="number" class="goal-input" [(ngModel)]="awayTeamGoals" min="0" max="150" placeholder="0" [disabled]="!isEditable"></ion-input>
          </div>
        </div>
      </div>

      <!-- Description -->
      <div class="result-card">
        <div class="card-label"><ion-icon name="create"></ion-icon> Description</div>
        <div class="desc-wrap">
          <ion-textarea [(ngModel)]="resultDescription" placeholder="Enter result description..." rows="3" [disabled]="!isEditable"></ion-textarea>
        </div>
      </div>
    </div>
  </div>

  <app-glass-button label="Save" (btnClick)="saveResult()"></app-glass-button>
</ion-content>
