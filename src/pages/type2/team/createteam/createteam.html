  Ionic pages and navigation.
-->
<ion-header>
  <ion-navbar>
    <ion-title>Create Team</ion-title>
    <ion-buttons end>
      <button ion-button icon-only>
        <ion-icon name="home"></ion-icon>
        <ion-icon name="more"></ion-icon>
      </button>
    </ion-buttons>
  </ion-navbar>
</ion-header>

<ion-content>
  <ion-list>
    <app-form-field [isDark]="isDarkTheme">
      <ion-item>
        <ion-label>Name</ion-label>
        <ion-input type="text" [(ngModel)]="parentClubTeamCreationInput.teamDetails.teamName"
          (ngModelChange)="teamNameInputChange()"></ion-input>
      </ion-item>
    </app-form-field>
    <ion-item *ngIf="teamNameError" class="error-item">
      <ion-label color="danger">{{teamNameErrorMessage}}</ion-label>
    </ion-item>

    <app-form-field [isDark]="isDarkTheme">
      <ion-item>
        <ion-label>Short Name</ion-label>
        <ion-input type="text" maxlength="3" style="text-transform:uppercase !important" autocapitalize="characters"
          [(ngModel)]="parentClubTeamCreationInput.teamDetails.shortName"
          (ngModelChange)="shortNameInputChange()"></ion-input>
      </ion-item>
    </app-form-field>

    <app-form-field [isDark]="isDarkTheme">
      <ion-item>
        <ion-label>Team Logo</ion-label>
        <img *ngIf="parentClubTeamCreationInput.teamDetails.logoUrl"
          [src]="parentClubTeamCreationInput.teamDetails.logoUrl" class="team-logo" item-end>
        <button ion-button icon-only clear (click)="selectTeamLogo()" class="upload-btn" item-end>
          <img src="assets/images/upload.svg" class="add_icon">
        </button>
      </ion-item>
    </app-form-field>
    
    <app-form-field [isDark]="isDarkTheme">
      <ion-item>
        <ion-label>Venue</ion-label>
        <ion-select [(ngModel)]="selectedClub" (ionChange)="onChangeOfClub()"
          [(ngModel)]="parentClubTeamCreationInput.teamDetails.venueKey">
          <ion-option *ngFor="let club of clubs" value="{{club.FirebaseId}}">
            {{club.ClubName}}</ion-option>
        </ion-select>
      </ion-item>
    </app-form-field>

    <app-form-field [isDark]="isDarkTheme">
      <ion-item [class.field-disabled]="lockActivity">
        <ion-label>Activity</ion-label>
        <ion-select [(ngModel)]="parentClubTeamCreationInput.teamDetails.activityCode" [disabled]="lockActivity">
          <ion-option *ngFor="let activity of club_activities"
            value="{{activity.ActivityCode}}">{{activity.ActivityName}}
          </ion-option>
        </ion-select>
      </ion-item>
    </app-form-field>

    <app-form-field [isDark]="isDarkTheme">
      <ion-item>
        <ion-label>Age Group</ion-label>
        <ion-input type="text" [(ngModel)]="parentClubTeamCreationInput.teamDetails.ageGroup"></ion-input>
        <button ion-button clear item-right class="help_btn" (click)="ageGroupHint()">
          <ion-icon name="ios-help-circle-outline"></ion-icon>
        </button>
      </ion-item>
    </app-form-field>

    <app-form-field [isDark]="isDarkTheme">
      <div [class.field-disabled]="lockClubTeam">
        <app-access-toggle [(isPublic)]="publicType"
          (isPublicChange)="changeType($event ? 'public' : 'private')" label="Team Access">
        </app-access-toggle>
      </div>
    </app-form-field>

    <div [class.toggle-disabled]="lockClubTeam">
      <app-expandable-section label="EXTERNAL TEAM" [(expanded)]="isExternalTeam">
      </app-expandable-section>
    </div>

    <app-form-field [isDark]="isDarkTheme">
      <ion-item class="description-item">
        <ion-label stacked>Description</ion-label>
        <ion-textarea type="text" rows="5" maxLength="500" placeholder="Team description, notes..."
          [(ngModel)]="parentClubTeamCreationInput.teamDetails.teamDescription"></ion-textarea>
      </ion-item>
    </app-form-field>
  </ion-list>

  <app-glass-button label="Create" (btnClick)="createTeamConfirm()"></app-glass-button>

</ion-content>
