<ion-header>
  <ion-navbar>
    <ion-title>Add Staff</ion-title>
    <ion-buttons end>
      <button ion-button icon-only (click)="dismiss()">
        <ion-icon name="close"></ion-icon>
      </button>
    </ion-buttons>
  </ion-navbar>
</ion-header>

<ion-content>
  <div class="page-layout">
    <div class="page-fixed-header">
      <app-search-bar placeholder="Search Staff by Name"
        [count]="filteredStaff?.length"
        (search)="getFilterItems($event)">
      </app-search-bar>
      <div class="section-header">
        <span class="section-title">Coaches List</span>
      </div>
    </div>

    <div class="page-scroll-area">
      <app-list-card *ngFor="let person of filteredStaff; let i = index"
        [accentColor]="person.isAlreadExisted ? '#64748b' : (person.isSelect ? '#10b981' : '#2b92bb')">
        <div class="staff-row" (click)="!person.isAlreadExisted && selectMembers(person)">
          <div class="staff-avatar">{{person.name?.charAt(0)}}</div>
          <div class="staff-info">
            <p class="staff-name">{{person.name}}
              <span class="staff-role" *ngIf="person.role"> ({{person.role}})</span>
            </p>
            <span class="staff-tag existing" *ngIf="person.isAlreadExisted">Already Added</span>
          </div>
          <ion-checkbox
            [(ngModel)]="person.isSelect"
            [disabled]="person.isAlreadExisted"
            (ionChange)="selectMembers(person)">
          </ion-checkbox>
        </div>
      </app-list-card>

      <div class="empty-state" *ngIf="filteredStaff?.length === 0">
        <ion-icon name="person" class="empty-icon"></ion-icon>
        <p class="empty-text">No staff found</p>
      </div>
    </div>
  </div>

  <app-glass-button label="Add Staff" (btnClick)="saveStaff()"></app-glass-button>
</ion-content>
