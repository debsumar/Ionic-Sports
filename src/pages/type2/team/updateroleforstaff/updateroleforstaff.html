<ion-header>
  <ion-navbar>
    <ion-title>Update Role</ion-title>
  </ion-navbar>
</ion-header>

<ion-content>
  <div class="page-layout">
    <div class="page-fixed-header">
      <div class="section-header">
        <span class="section-title">Select Role</span>
      </div>
    </div>

    <div class="page-scroll-area">
      <app-list-card *ngFor="let role of roles; let i = index"
        [accentColor]="selectedRoleId === role.id ? '#10b981' : '#2b92bb'"
        (cardClick)="selectRoleToUpdate(role); selectedRoleId = role.id">
        <div class="role-row">
          <div class="role-avatar">
            <ion-icon [name]="selectedRoleId === role.id ? 'checkmark-circle' : 'radio-button-off'"
              [style.color]="selectedRoleId === role.id ? '#10b981' : '#64748b'"></ion-icon>
          </div>
          <div class="role-info">
            <p class="role-name">{{role.role_name}}</p>
          </div>
          <span class="role-tag current" *ngIf="currentRole?.role_name === role.role_name">Current</span>
        </div>
      </app-list-card>

      <div class="empty-state" *ngIf="roles?.length === 0">
        <ion-icon name="people" class="empty-icon"></ion-icon>
        <p class="empty-text">No roles available</p>
      </div>
    </div>
  </div>

  <app-glass-button label="Update" (btnClick)="updateroleforstaff()"></app-glass-button>
</ion-content>
