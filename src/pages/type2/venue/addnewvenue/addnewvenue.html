<ion-header *ngIf="themeType == 1">
    <ion-navbar>
        <button ion-button menuToggle>
      <ion-icon name="menu"></ion-icon>
    </button>
        <ion-title>Add Venue</ion-title>
        <ion-buttons end>
            <button ion-button icon-only (click)="presentPopover($event)">
        <ion-icon name="more"></ion-icon>
      </button>
        </ion-buttons>
    </ion-navbar>
</ion-header>
<ion-header>
    <ion-navbar *ngIf="themeType == 2">
        <button ion-button icon-only menuToggle (click)="goToDashboardMenuPage()">
      <ion-icon name="apps"></ion-icon>
    </button>
        <ion-title>
            Add Venue
        </ion-title>
        <ion-buttons end>
            <button ion-button icon-only (click)="goToDashboardMenuPage()">
                 <img src="assets/images/home.svg" class="home_btn">
            </button>
            <button ion-button icon-only (click)="presentPopover($event)">
        <ion-icon name="more"></ion-icon>
      </button>
        </ion-buttons>
    </ion-navbar>
</ion-header>


<ion-content [class.dark-theme]="isDarkTheme" [class.light-theme]="!isDarkTheme">
    <ion-list>
        <app-form-field [isDark]="isDarkTheme">
            <ion-item>
                <ion-label stacked>Venue Name</ion-label>
                <ion-textarea type="text" rows="1" [(ngModel)]="clubObj.ClubName" required></ion-textarea>
            </ion-item>
        </app-form-field>
        <app-form-field [isDark]="isDarkTheme">
            <ion-item>
                <ion-label stacked>Venue Short Name</ion-label>
                <ion-textarea type="text" rows="1" [(ngModel)]="clubObj.ClubShortName"></ion-textarea>
            </ion-item>
        </app-form-field>
        <app-form-field [isDark]="isDarkTheme">
            <ion-item>
                <ion-label stacked>Description</ion-label>
                <ion-textarea type="text" rows="1" [(ngModel)]="clubObj.ClubDescription"></ion-textarea>
            </ion-item>
        </app-form-field>
        <app-form-field [isDark]="isDarkTheme">
            <ion-item>
                <ion-label stacked>Contact Name</ion-label>
                <ion-textarea type="text" rows="1" [(ngModel)]="clubObj.ClubContactName"></ion-textarea>
            </ion-item>
        </app-form-field>
        <app-form-field [isDark]="isDarkTheme">
            <ion-item>
                <ion-label stacked>Contact Phone</ion-label>
                <ion-input type="number" [(ngModel)]="clubObj.ContactPhone"></ion-input>
            </ion-item>
        </app-form-field>
        <app-form-field [isDark]="isDarkTheme">
            <ion-item>
                <ion-label stacked>First Line Address</ion-label>
                <ion-textarea type="text" rows="1" [(ngModel)]="clubObj.FirstLineAddress" required></ion-textarea>
            </ion-item>
        </app-form-field>
        <app-form-field [isDark]="isDarkTheme">
            <ion-item>
                <ion-label stacked>Second Line Address</ion-label>
                <ion-textarea type="text" rows="1" [(ngModel)]="clubObj.SecondLineAddress" required></ion-textarea>
            </ion-item>
        </app-form-field>
        <app-form-field [isDark]="isDarkTheme">
            <ion-item>
                <ion-label stacked>City</ion-label>
                <ion-textarea type="text" rows="1" [(ngModel)]="clubObj.City" required></ion-textarea>
            </ion-item>
        </app-form-field>
        <app-form-field [isDark]="isDarkTheme">
            <ion-item>
                <ion-label stacked>State/County</ion-label>
                <ion-textarea type="text" rows="1" [(ngModel)]="clubObj.State" required></ion-textarea>
            </ion-item>
        </app-form-field>
        <app-form-field [isDark]="isDarkTheme">
            <ion-item class="select-item">
                <ion-label>Country</ion-label>
                <ion-select [(ngModel)]="clubObj.Country" (ionChange)="countryAssign()">
                    <ion-option *ngFor="let eachcountry of country" value={{eachcountry.CountryCode}}>{{eachcountry.CountryName}}</ion-option>
                </ion-select>
            </ion-item>
        </app-form-field>
        <app-form-field [isDark]="isDarkTheme">
            <ion-item>
                <ion-label stacked>Post Code</ion-label>
                <ion-textarea type="text" rows="1" [(ngModel)]="clubObj.PostCode" (keyup)="clubObj.PostCode = clubObj.PostCode.toUpperCase()"></ion-textarea>
            </ion-item>
        </app-form-field>
        <app-form-field [isDark]="isDarkTheme">
            <ion-item>
                <ion-label stacked>Google Map URL</ion-label>
                <ion-textarea type="text" rows="1" [(ngModel)]="clubObj.Location"></ion-textarea>
            </ion-item>
        </app-form-field>
        <app-form-field [isDark]="isDarkTheme">
            <ion-item>
                <ion-label stacked>Website URL</ion-label>
                <ion-textarea type="text" rows="1" [(ngModel)]="clubObj.WebsiteUrl"></ion-textarea>
            </ion-item>
        </app-form-field>
    </ion-list>
</ion-content>

<ion-footer no-border [class.dark-theme]="isDarkTheme" [class.light-theme]="!isDarkTheme">
    <button class="cancel-btn" (click)="cancelVenue()">Cancel</button>
    <app-glass-button label="Save" (btnClick)="save()"></app-glass-button>
</ion-footer>
