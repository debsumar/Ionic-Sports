<!--
  AddrecuringbookingPage template — themed (dark/light) form using shared reusable components.
  ngModel bindings and click handlers are unchanged.
-->
<ion-header>
  <ion-navbar>
    <ion-title>Add Recurring Booking</ion-title>
  </ion-navbar>
</ion-header>


<ion-content [class.dark-theme]="isDarkTheme" [class.light-theme]="!isDarkTheme">
  <ion-list>
    <!-- Club / Activity -->
    <app-form-field [isDark]="isDarkTheme">
      <ion-item>
        <ion-label>Club</ion-label>
        <ion-select [(ngModel)]="selectedClubKey" (ionChange)="getAllActivity()">
          <ion-option *ngFor="let club of clubs" value={{club.FirebaseId}}>{{club.ClubName}}</ion-option>
        </ion-select>
      </ion-item>
    </app-form-field>

    <app-form-field [isDark]="isDarkTheme">
      <ion-item>
        <ion-label>Activity</ion-label>
        <ion-select [(ngModel)]="selectedActivity" (ionChange)="getAllCourts()">
          <ion-option *ngFor="let Activity of ActivityList" value={{Activity.$key}}>{{Activity.ActivityName}}</ion-option>
        </ion-select>
      </ion-item>
    </app-form-field>

    <app-form-field [isDark]="isDarkTheme">
      <ion-item>
        <ion-label>Court</ion-label>
        <ion-select [(ngModel)]="selectedCourt">
          <ion-option value="all">All</ion-option>
          <ion-option *ngFor="let court of courts" value={{court.$key}}>{{court.CourtName}}</ion-option>
        </ion-select>
      </ion-item>
    </app-form-field>

    <!-- Date range -->
    <app-form-field [isDark]="isDarkTheme">
      <ion-item>
        <ion-label>Start Date</ion-label>
        <ion-datetime displayFormat="DD/MM/YYYY" min={{minDate}} max={{maxDate}} [(ngModel)]="recuringObj.StartDate" placeholder="Start Date"></ion-datetime>
      </ion-item>
    </app-form-field>

    <app-form-field [isDark]="isDarkTheme">
      <ion-item>
        <ion-label>End Date</ion-label>
        <ion-datetime displayFormat="DD/MM/YYYY" min={{minDate}} max={{maxDate}} [(ngModel)]="recuringObj.EndDate" placeholder="End Date"></ion-datetime>
      </ion-item>
    </app-form-field>

    <!-- Time range -->
    <app-form-field [isDark]="isDarkTheme">
      <ion-item>
        <ion-label>Start Time</ion-label>
        <ion-datetime displayFormat="HH:mm" placeholder="Start Time" [(ngModel)]="recuringObj.StartTime" [minuteValues]="minuteValues"></ion-datetime>
      </ion-item>
    </app-form-field>

    <app-form-field [isDark]="isDarkTheme">
      <ion-item>
        <ion-label>End Time</ion-label>
        <ion-datetime displayFormat="HH:mm" placeholder="End Time" [(ngModel)]="recuringObj.EndTime" [minuteValues]="minuteValues"></ion-datetime>
      </ion-item>
    </app-form-field>

    <!-- Days selector -->
    <div class="days-card">
      <p class="days-label">Days</p>
      <div class="days">
        <button type="button" class="rounded" (click)="selectDays('Mon',1)" [ngClass]="{'timekare-primary-btn':this.daysDetails.has('Mon')}">M</button>
        <button type="button" class="rounded" (click)="selectDays('Tue',2)" [ngClass]="{'timekare-primary-btn':this.daysDetails.has('Tue')}">T</button>
        <button type="button" class="rounded" (click)="selectDays('Wed',3)" [ngClass]="{'timekare-primary-btn':this.daysDetails.has('Wed')}">W</button>
        <button type="button" class="rounded" (click)="selectDays('Thu',4)" [ngClass]="{'timekare-primary-btn':this.daysDetails.has('Thu')}">T</button>
        <button type="button" class="rounded" (click)="selectDays('Fri',5)" [ngClass]="{'timekare-primary-btn':this.daysDetails.has('Fri')}">F</button>
        <button type="button" class="rounded" (click)="selectDays('Sat',6)" [ngClass]="{'timekare-primary-btn':this.daysDetails.has('Sat')}">S</button>
        <button type="button" class="rounded" (click)="selectDays('Sun',7)" [ngClass]="{'timekare-primary-btn':this.daysDetails.has('Sun')}">S</button>
      </div>
    </div>

    <!-- Purpose -->
    <app-form-field [isDark]="isDarkTheme">
      <ion-item>
        <ion-label>Purpose</ion-label>
        <ion-select placeholder="Purpose" [(ngModel)]="recuringObj.BookingFor" (ngModelChange)="add_option()">
          <ion-option *ngFor="let pur of purposeList" value="{{pur}}">{{pur}}</ion-option>
        </ion-select>
      </ion-item>
    </app-form-field>

    <!-- Notes -->
    <app-form-field [isDark]="isDarkTheme">
      <ion-item class="description-item">
        <ion-label stacked>Notes</ion-label>
        <ion-textarea rows="3" placeholder="Notes" [(ngModel)]="recuringObj.Comments"></ion-textarea>
      </ion-item>
    </app-form-field>
  </ion-list>
</ion-content>

<ion-footer no-border [class.dark-theme]="isDarkTheme" [class.light-theme]="!isDarkTheme">
  <app-glass-button label="Book" (btnClick)="validate()"></app-glass-button>
</ion-footer>
