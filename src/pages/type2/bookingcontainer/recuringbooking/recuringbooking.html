<!--
  RecuringbookingPage template — themed (dark/light) using shared reusable components.
  Business logic (selects, action sheet, navigation) is unchanged.
-->
<ion-header>
  <ion-navbar>
    <ion-title>Recurring Booking</ion-title>
  </ion-navbar>
</ion-header>


<ion-content>
    <div class="rb-header">
        <!-- 🎛️ Club / Activity filters -->
        <div class="filter-row">
            <ion-item class="filter-item">
                <ion-select [selectOptions]="{title:'Select Club',mode:'ios'}" [(ngModel)]="selectedClubKey" interface="action-sheet">
                    <ion-option *ngFor="let club of clubs" value={{club.FirebaseId}} (ionSelect)="onClubChange($event)">{{club.ClubName}}</ion-option>
                </ion-select>
            </ion-item>
            <ion-item class="filter-item">
                <ion-select [selectOptions]="{title:'Select Activity',mode:'ios'}" [(ngModel)]="selectedActivity" interface="action-sheet">
                    <ion-option *ngFor="let Activity of ActivityList" value={{Activity.$key}} (ionSelect)="onActivityChange($event)">{{Activity.ActivityName}}</ion-option>
                </ion-select>
            </ion-item>
        </div>
        <div class="filter-row">
            <ion-item class="filter-item full">
                <ion-label>Select Courts</ion-label>
                <ion-select [selectOptions]="{title:'Select Court',mode:'ios'}" [(ngModel)]="selectedCourt" interface="action-sheet">
                    <ion-option *ngFor="let court of courts" value={{court.$key}} (ionSelect)="onCourtChange($event)">{{court.CourtName}}</ion-option>
                </ion-select>
            </ion-item>
        </div>
    </div>

    <!-- 📋 Recurring booking listing -->
    <div class="rb-list">
        <primary-card *ngFor="let court of recuringBookDetails" accentColor="#35adff"
            (cardClick)="presentActionSheet(court)">
            <div class="rb-card-content">
                <div class="rb-row rb-title-row">
                    <span class="rb-name">{{court.name}}</span>
                    <span class="rb-time-badge">{{court.starttime}}</span>
                </div>
                <div class="rb-row">
                    <span class="rb-detail">{{court.startdate}} To {{court.enddate}}</span>
                    <div class="rb-right">
                        <p class="rb-time">{{court.starttime}} - {{court.endtime}}</p>
                        <p class="rb-days">
                            <button *ngFor="let day of daysDetails;let i = index" class="day-btn"
                                [ngClass]="{'selected2':court.bookingdays.has(day)}">{{getFirst(day)}}</button>
                        </p>
                    </div>
                </div>
                <div class="rb-row">
                    <span class="rb-detail">{{court.activityname}}</span>
                    <span class="rb-detail">{{court.bookingfor}}</span>
                </div>
            </div>
        </primary-card>
    </div>

    <!-- 🈳 Empty state -->
    <div class="empty-state" *ngIf="recuringBookDetails.length == 0">
        <ion-icon name="repeat" class="empty-icon"></ion-icon>
        <p class="empty-title">No Recurring Bookings</p>
    </div>
</ion-content>

<ion-fab right bottom>
    <button ion-fab mini class="add-fab" (click)="addRecuringBooking()">
        <ion-icon name="add"></ion-icon>
    </button>
</ion-fab>
