<ion-header>
  <ion-navbar>
    <ion-title>Recurring Matches</ion-title>
  </ion-navbar>
</ion-header>

<ion-content [class.dark-theme]="isDarkTheme" [class.light-theme]="!isDarkTheme">
  <ion-list>
    <app-form-field [isDark]="isDarkTheme">
      <ion-item>
        <ion-label>Match</ion-label>
        <ion-input type="text" [value]="match?.MatchTitle" disabled></ion-input>
      </ion-item>
    </app-form-field>

    <app-form-field [isDark]="isDarkTheme">
      <ion-item>
        <ion-label>Until When</ion-label>
        <ion-datetime displayFormat="DD MMM YYYY" pickerFormat="DD MMM YYYY"
          [(ngModel)]="untilWhen" [min]="minDate" [max]="maxDate"></ion-datetime>
      </ion-item>
    </app-form-field>

    <app-form-field [isDark]="isDarkTheme">
      <div class="day-chips-section">
        <p class="day-chips-label">WEEKDAYS</p>
        <div class="day-chips">
          <button *ngFor="let day of allDays" class="day-chip"
            [class.selected]="isDaySelected(day)" (click)="toggleDay(day)">{{day.substring(0,3)}}</button>
        </div>
      </div>
    </app-form-field>
  </ion-list>

  <app-glass-button label="Create Recurring Matches" (btnClick)="createRecurringMatches()"></app-glass-button>
</ion-content>
