<ion-content>
  <div class="page-layout">
    <div class="page-fixed-header">
      <!-- Points / Head-to-Head Tabs -->
      <app-pill-tabs
        leftLabel="Points" rightLabel="Head-to-Head"
        leftIcon="trophy" rightIcon="people"
        [activeIndex]="activeTabIndex"
        (activeIndexChange)="onTabChange($event)">
      </app-pill-tabs>

      <!-- Age Category Dropdown (Points tab only) -->
      <div class="filter-card" *ngIf="isPoints == 'Points'">
        <div class="filter-label">
          <ion-icon name="funnel" class="filter-icon"></ion-icon>
          <span>Age Category</span>
        </div>
        <div class="filter-select-wrap">
          <ion-select class="filter-select" [(ngModel)]="selectedcat" (ionChange)="getLadderList()" interface="popover">
            <ion-option *ngFor="let cat of ageCategories" value={{cat.Id}}>{{cat.CategoryName}} ({{cat.AgeFrom}} - {{cat.AgeTo}})</ion-option>
          </ion-select>
          <ion-icon name="chevron-down" class="select-arrow"></ion-icon>
        </div>
      </div>

      <!-- Search Bar -->
      <app-search-bar
        [placeholder]="'Search by rank, name...'"
        [(value)]="searchInput"
        [count]="searchCount"
        (search)="getFilterItems($event)">
      </app-search-bar>
    </div>

    <div class="page-scroll-area">
      <!-- Points List -->
      <div *ngIf="isPoints == 'Points'">
        <app-list-card *ngFor="let ladder of filteredLadder"
          [accentColor]="'#2b92bb'">
          <div class="ladder-row">
            <div class="rank-badge">{{ladder.rank}}</div>
            <div class="ladder-info">
              <p class="ladder-name">{{ladder.FirstName}} {{ladder.LastName}}</p>
            </div>
            <div class="points-badge">{{ladder.Points}} <span class="pts-label">pts</span></div>
          </div>
        </app-list-card>
        <div class="empty-state" *ngIf="filteredLadder?.length === 0">
          <ion-icon name="trophy" class="empty-icon"></ion-icon>
          <p class="empty-text">No ladder data available</p>
        </div>
      </div>

      <!-- Head-to-Head List -->
      <div *ngIf="isPoints == 'HeadtoHead'">
        <app-list-card *ngFor="let ladder of filteredLadderHead"
          [accentColor]="'#35adff'">
          <div class="ladder-row">
            <div class="rank-badge h2h">{{ladder.rank}}</div>
            <div class="ladder-info">
              <p class="ladder-name">{{ladder.FirstName}} {{ladder.LastName}}</p>
            </div>
          </div>
        </app-list-card>
        <div class="empty-state" *ngIf="filteredLadderHead?.length === 0">
          <ion-icon name="people" class="empty-icon"></ion-icon>
          <p class="empty-text">No head-to-head data available</p>
        </div>
      </div>
    </div>
  </div>
</ion-content>
