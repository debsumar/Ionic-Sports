<ion-content class="coaches-listing">
  <div class="page-layout">
    <div class="page-fixed-header">
      <div class="header-row">
        <button ion-button icon-only clear class="back-btn" (click)="goBack()">
          <ion-icon name="arrow-back"></ion-icon>
        </button>
        <span class="header-title">Coaches</span>
      </div>
      <app-search-bar
        placeholder="Search coaches..."
        [(value)]="searchInput"
        [count]="filteredCoaches.length"
        (search)="onSearch($event)">
      </app-search-bar>
    </div>

    <div class="page-scroll-area">
      <div class="items-container" *ngIf="filteredCoaches.length > 0">
        <div class="revamp-card" *ngFor="let coach of filteredCoaches"
          [class.selected]="isSelected(coach.Id)"
          [class.removing]="isMarkedForRemoval(coach.Id)"
          (click)="toggleCoach(coach.Id)">
          <div class="card-accent"></div>
          <div class="card-content">
            <div class="card-top-row">
              <div class="card-icon-wrapper">
                <ion-icon name="person" class="card-icon"></ion-icon>
              </div>
              <div class="card-info">
                <h3 class="card-title">{{coach.first_name}} {{coach.last_name}}</h3>
                <p class="card-subtitle">{{coach.email_id}}</p>
              </div>
              <span class="existing-badge remove" *ngIf="isMarkedForRemoval(coach.Id)">Will Remove</span>
              <span class="existing-badge" *ngIf="isExisting(coach.Id) && isSelected(coach.Id)">Added</span>
              <div class="check-circle" [class.checked]="isSelected(coach.Id)">
                <ion-icon name="checkmark" *ngIf="isSelected(coach.Id)"></ion-icon>
              </div>
            </div>
            <div class="card-divider"></div>
            <div class="card-details">
              <div class="detail-row">
                <ion-icon name="call" class="detail-icon"></ion-icon>
                <span class="detail-text">{{coach.phone_no || 'N/A'}}</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="modern-empty-state" *ngIf="filteredCoaches.length === 0">
        <ion-icon name="person" class="empty-icon"></ion-icon>
        <div class="empty-title">No Coaches Found</div>
        <div class="empty-description">No coaches available at the moment</div>
      </div>
    </div>

    <button class="btn-gradient-shine" *ngIf="hasChanges()"
      (click)="updateCoachAssignment()">
      {{getButtonLabel()}}
    </button>
  </div>
</ion-content>
