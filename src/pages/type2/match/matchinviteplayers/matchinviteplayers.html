<ion-header>
  <ion-navbar>
    <ion-title>Invite Players</ion-title>
    <ion-buttons end>
      <button ion-button icon-only (click)="dismiss()">
        <ion-icon name="close"></ion-icon>
      </button>
    </ion-buttons>
  </ion-navbar>
</ion-header>

<ion-content>
  <div class="page-layout">
    <div class="page-fixed-header">
      <app-search-bar placeholder="Search Players by Name"
        [count]="filteredMembers?.length"
        (search)="getFilterItems($event)">
      </app-search-bar>
      <div class="section-header">
        <span class="section-title">Players List</span>
      </div>
    </div>

    <div class="page-scroll-area" #scrollArea (scroll)="onScroll($event)">
      <app-list-card *ngFor="let member of filteredMembers; let i = index"
        [accentColor]="member.isAlreadyExisted ? '#64748b' : (member.isSelected ? '#10b981' : '#2b92bb')">
        <div class="player-row" (click)="!member.isAlreadyExisted && selectMembers(member)">
          <div class="player-avatar">{{member.FirstName?.charAt(0) || '?'}}</div>
          <div class="player-info">
            <p class="player-name">{{member.FirstName || 'Unknown'}} {{member.LastName || ''}} ({{getAge(member.DOB)}})</p>
            <span class="player-tag existing" *ngIf="member.isAlreadyExisted">Already Invited</span>
          </div>
          <ion-checkbox
            [(ngModel)]="member.isSelected"
            [disabled]="member.isAlreadyExisted"
            (ionChange)="selectMembers(member)">
          </ion-checkbox>
        </div>
      </app-list-card>

      <div class="empty-state" *ngIf="filteredMembers?.length === 0">
        <ion-icon name="people" class="empty-icon"></ion-icon>
        <p class="empty-text">No players found</p>
      </div>

      <div class="loading-more" *ngIf="isLoadingMore">
        <ion-spinner name="crescent"></ion-spinner>
        <span>Loading more data...</span>
      </div>
    </div>
  </div>

  <app-glass-button label="Add Players" (btnClick)="inviteUsers()"></app-glass-button>
</ion-content>
